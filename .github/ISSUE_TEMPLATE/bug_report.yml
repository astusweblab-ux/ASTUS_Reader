name: Bug report
description: Report a crash or incorrect behavior in ASTUS Reader.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Xiaomi 14, Android 16
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Import...
        3. Tap...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add screenshots, logcat output, or sample file details if possible.
